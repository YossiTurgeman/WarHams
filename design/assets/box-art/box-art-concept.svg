<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Planet surface gradient -->
    <radialGradient id="planetGrad" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a5a5a"/>
      <stop offset="60%" stop-color="#1a3a3a"/>
      <stop offset="100%" stop-color="#0d2020"/>
    </radialGradient>

    <!-- Atmospheric glow -->
    <radialGradient id="atmosGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#2a8a8a" stop-opacity="0.15"/>
      <stop offset="85%" stop-color="#1a6a6a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1a6a6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Metallic text gradient -->
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e8d0"/>
      <stop offset="25%" stop-color="#c8b888"/>
      <stop offset="50%" stop-color="#e8dcc0"/>
      <stop offset="75%" stop-color="#a09060"/>
      <stop offset="100%" stop-color="#c8b888"/>
    </linearGradient>

    <!-- Info bar gradient -->
    <linearGradient id="infoBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050510" stop-opacity="0"/>
      <stop offset="20%" stop-color="#1a3a3a" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2a5a5a" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#1a3a3a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Strong glow for text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#2a8a8a" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feComposite in="SourceGraphic" in2="colorBlur" operator="over"/>
    </filter>

    <!-- Icon glow -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Planet shadow (3D effect) -->
    <radialGradient id="planetShadow" cx="65%" cy="60%" r="55%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Hex grid pattern -->
    <pattern id="hexGrid" width="30" height="52" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <polygon points="15,0 30,9 30,26 15,35 0,26 0,9" fill="none" stroke="#3a7a7a" stroke-width="0.5" opacity="0.3"/>
      <polygon points="15,17 30,26 30,43 15,52 0,43 0,26" fill="none" stroke="#3a7a7a" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Clip path for planet hex grid -->
    <clipPath id="planetClip">
      <circle cx="400" cy="380" r="195"/>
    </clipPath>

    <!-- Soldier silhouette (reusable) -->
    <path id="soldierShape" d="
      M0,-60 L8,-58 L10,-45 L15,-42 L18,-35 L16,-28 L12,-25 L14,-20
      L20,-18 L25,-8 L28,0 L25,5 L22,8 L24,15 L26,25 L24,35 L22,40
      L25,50 L23,60 L18,62 L15,58 L12,62 L8,60 L5,55 L3,60
      L0,62 L-3,60 L-5,55 L-8,60 L-12,62 L-15,58 L-18,62 L-23,60
      L-25,50 L-22,40 L-24,35 L-26,25 L-24,15 L-22,8 L-25,5
      L-28,0 L-25,-8 L-20,-18 L-14,-20 L-12,-25 L-16,-28 L-18,-35
      L-15,-42 L-10,-45 L-8,-58 Z
      M-6,-55 L-4,-48 L4,-48 L6,-55 Z
    "/>

    <!-- Soldier with weapon arm variant -->
    <path id="soldierGun" d="
      M0,-60 L8,-58 L10,-45 L15,-42 L18,-35 L16,-28 L12,-25 L14,-20
      L20,-18 L28,-22 L35,-28 L38,-27 L36,-22 L28,-14 L25,-8 L28,0
      L25,5 L22,8 L24,15 L26,25 L24,35 L22,40 L25,50 L23,60 L18,62
      L15,58 L12,62 L8,60 L5,55 L3,60 L0,62 L-3,60 L-5,55 L-8,60
      L-12,62 L-15,58 L-18,62 L-23,60 L-25,50 L-22,40 L-24,35
      L-26,25 L-24,15 L-22,8 L-25,5 L-28,0 L-25,-8 L-20,-18
      L-14,-20 L-12,-25 L-16,-28 L-18,-35 L-15,-42 L-10,-45 L-8,-58 Z
      M-6,-55 L-4,-48 L4,-48 L6,-55 Z
    "/>
  </defs>

  <!-- ===== BACKGROUND: Deep space ===== -->
  <rect width="800" height="800" fill="#050510"/>

  <!-- Stars (scattered random dots) -->
  <g opacity="0.8">
    <circle cx="45" cy="30" r="1" fill="#ffffff"/>
    <circle cx="120" cy="65" r="0.6" fill="#aaaacc"/>
    <circle cx="200" cy="20" r="1.2" fill="#ffffff"/>
    <circle cx="310" cy="45" r="0.5" fill="#8888aa"/>
    <circle cx="450" cy="25" r="0.8" fill="#ccccdd"/>
    <circle cx="560" cy="50" r="1" fill="#ffffff"/>
    <circle cx="650" cy="35" r="0.7" fill="#aaaacc"/>
    <circle cx="730" cy="70" r="1.1" fill="#ffffff"/>
    <circle cx="780" cy="20" r="0.5" fill="#8888aa"/>
    <circle cx="70" cy="130" r="0.8" fill="#ccccdd"/>
    <circle cx="160" cy="150" r="1.3" fill="#ffffff"/>
    <circle cx="25" cy="200" r="0.6" fill="#aaaacc"/>
    <circle cx="680" cy="120" r="0.9" fill="#ffffff"/>
    <circle cx="750" cy="160" r="0.7" fill="#ccccdd"/>
    <circle cx="90" cy="250" r="1" fill="#ffffff"/>
    <circle cx="30" cy="320" r="0.5" fill="#8888aa"/>
    <circle cx="720" cy="230" r="1.1" fill="#ffffff"/>
    <circle cx="770" cy="300" r="0.6" fill="#aaaacc"/>
    <circle cx="55" cy="400" r="0.8" fill="#ccccdd"/>
    <circle cx="740" cy="380" r="1" fill="#ffffff"/>
    <circle cx="20" cy="480" r="0.7" fill="#aaaacc"/>
    <circle cx="100" cy="520" r="1.2" fill="#ffffff"/>
    <circle cx="760" cy="450" r="0.5" fill="#8888aa"/>
    <circle cx="700" cy="500" r="0.9" fill="#ccccdd"/>
    <circle cx="40" cy="580" r="1" fill="#ffffff"/>
    <circle cx="130" cy="610" r="0.6" fill="#aaaacc"/>
    <circle cx="680" cy="570" r="1.3" fill="#ffffff"/>
    <circle cx="750" cy="620" r="0.8" fill="#ccccdd"/>
    <circle cx="60" cy="680" r="0.7" fill="#8888aa"/>
    <circle cx="780" cy="700" r="1" fill="#ffffff"/>
    <circle cx="350" cy="130" r="0.5" fill="#aaaacc"/>
    <circle cx="500" cy="110" r="0.8" fill="#ccccdd"/>
    <circle cx="250" cy="100" r="1" fill="#ffffff"/>
    <circle cx="600" cy="90" r="0.6" fill="#8888aa"/>
    <circle cx="420" cy="160" r="0.9" fill="#ffffff"/>
    <circle cx="530" cy="180" r="0.7" fill="#aaaacc"/>
    <circle cx="180" cy="350" r="0.5" fill="#ccccdd"/>
    <circle cx="620" cy="340" r="1.1" fill="#ffffff"/>
    <circle cx="150" cy="450" r="0.8" fill="#8888aa"/>
    <circle cx="650" cy="440" r="0.6" fill="#aaaacc"/>
    <circle cx="300" cy="600" r="1" fill="#ffffff"/>
    <circle cx="500" cy="620" r="0.7" fill="#ccccdd"/>
    <circle cx="220" cy="680" r="0.9" fill="#ffffff"/>
    <circle cx="580" cy="700" r="0.5" fill="#8888aa"/>
    <circle cx="400" cy="720" r="1.2" fill="#ffffff"/>
    <circle cx="470" cy="150" r="0.4" fill="#aaaacc"/>
    <circle cx="330" cy="280" r="0.6" fill="#ffffff"/>
    <circle cx="85" cy="85" r="1.4" fill="#ffffff"/>
    <circle cx="715" cy="85" r="1.4" fill="#ffffff"/>
    <circle cx="260" cy="195" r="0.5" fill="#ccccdd"/>
    <circle cx="540" cy="260" r="0.7" fill="#aaaacc"/>
  </g>

  <!-- Faint nebula wisps -->
  <ellipse cx="200" cy="300" rx="180" ry="80" fill="#1a2a4a" opacity="0.06" transform="rotate(-20 200 300)"/>
  <ellipse cx="600" cy="250" rx="150" ry="60" fill="#2a1a3a" opacity="0.05" transform="rotate(15 600 250)"/>

  <!-- ===== ATMOSPHERIC GLOW around planet ===== -->
  <circle cx="400" cy="380" r="260" fill="url(#atmosGlow)"/>

  <!-- ===== PLANET ===== -->
  <!-- Planet base sphere -->
  <circle cx="400" cy="380" r="195" fill="url(#planetGrad)"/>

  <!-- Hex grid overlay on planet -->
  <circle cx="400" cy="380" r="195" fill="url(#hexGrid)" clip-path="url(#planetClip)"/>

  <!-- Surface features (continental shapes) -->
  <g clip-path="url(#planetClip)" opacity="0.15">
    <ellipse cx="350" cy="340" rx="80" ry="50" fill="#2a6a5a" transform="rotate(-10 350 340)"/>
    <ellipse cx="440" cy="410" rx="60" ry="70" fill="#2a6a5a" transform="rotate(20 440 410)"/>
    <ellipse cx="320" cy="430" rx="40" ry="30" fill="#2a5a4a" transform="rotate(-5 320 430)"/>
    <ellipse cx="470" cy="330" rx="50" ry="25" fill="#2a5a4a" transform="rotate(10 470 330)"/>
  </g>

  <!-- Planet 3D shadow overlay -->
  <circle cx="400" cy="380" r="195" fill="url(#planetShadow)"/>

  <!-- Planet edge highlight -->
  <circle cx="400" cy="380" r="194" fill="none" stroke="#3a8a8a" stroke-width="1" opacity="0.3"/>

  <!-- ===== ORBITAL RESOURCE ICONS ===== -->
  <!-- Oil drum (top-left orbit) -->
  <g transform="translate(248, 235)" filter="url(#iconGlow)" opacity="0.7">
    <rect x="-7" y="-10" width="14" height="20" rx="2" fill="none" stroke="#cc8844" stroke-width="1.5"/>
    <line x1="-7" y1="-4" x2="7" y2="-4" stroke="#cc8844" stroke-width="1"/>
    <line x1="-7" y1="4" x2="7" y2="4" stroke="#cc8844" stroke-width="1"/>
    <rect x="-3" y="-2" width="6" height="4" fill="none" stroke="#cc8844" stroke-width="0.8"/>
  </g>

  <!-- Lightning bolt (top-right orbit) -->
  <g transform="translate(555, 240)" filter="url(#iconGlow)" opacity="0.7">
    <polygon points="3,-12 -4,0 1,0 -3,12 6,0 1,0" fill="#cccc44" opacity="0.9"/>
  </g>

  <!-- Waves / water (right orbit) -->
  <g transform="translate(590, 370)" filter="url(#iconGlow)" opacity="0.7">
    <path d="M-10,-3 Q-5,-8 0,-3 Q5,2 10,-3" fill="none" stroke="#4488cc" stroke-width="1.5"/>
    <path d="M-10,3 Q-5,-2 0,3 Q5,8 10,3" fill="none" stroke="#4488cc" stroke-width="1.5"/>
  </g>

  <!-- Hammer (left orbit) -->
  <g transform="translate(210, 390)" filter="url(#iconGlow)" opacity="0.7">
    <line x1="0" y1="-4" x2="0" y2="12" stroke="#aa8866" stroke-width="1.5"/>
    <rect x="-7" y="-10" width="14" height="8" rx="1" fill="none" stroke="#aa8866" stroke-width="1.5"/>
  </g>

  <!-- Recruit / person (bottom-right orbit) -->
  <g transform="translate(530, 510)" filter="url(#iconGlow)" opacity="0.7">
    <circle cx="0" cy="-7" r="4" fill="none" stroke="#88cc88" stroke-width="1.5"/>
    <path d="M-6,2 Q-6,-2 0,0 Q6,-2 6,2 L5,10 L-5,10 Z" fill="none" stroke="#88cc88" stroke-width="1.5"/>
  </g>

  <!-- Faint orbital path rings -->
  <ellipse cx="400" cy="380" rx="230" ry="180" fill="none" stroke="#3a8a8a" stroke-width="0.4" opacity="0.15" transform="rotate(-15 400 380)"/>
  <ellipse cx="400" cy="380" rx="250" ry="200" fill="none" stroke="#3a8a8a" stroke-width="0.3" opacity="0.1" transform="rotate(10 400 380)"/>

  <!-- ===== SOLDIER SILHOUETTES (foreground bottom) ===== -->
  <!-- Ground fog / mist at bottom -->
  <linearGradient id="groundFog" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#050510" stop-opacity="0"/>
    <stop offset="60%" stop-color="#0a1520" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#0a1520" stop-opacity="0.95"/>
  </linearGradient>
  <rect x="0" y="620" width="800" height="180" fill="url(#groundFog)"/>

  <!-- Player 1: Red soldier (left) -->
  <g transform="translate(220, 720) scale(1.3)">
    <use href="#soldierGun" fill="#cc4444" opacity="0.9"/>
    <!-- Shoulder light -->
    <circle cx="14" cy="-20" r="2" fill="#ff6666" opacity="0.6"/>
  </g>

  <!-- Player 2: Blue soldier (center-left) -->
  <g transform="translate(330, 710) scale(1.4)">
    <use href="#soldierShape" fill="#4488cc" opacity="0.9"/>
    <circle cx="14" cy="-20" r="2" fill="#66aaee" opacity="0.6"/>
  </g>

  <!-- Player 3: Green soldier (center-right) -->
  <g transform="translate(470, 710) scale(1.4)">
    <use href="#soldierGun" fill="#44aa44" opacity="0.9" transform="scale(-1,1)"/>
    <circle cx="-14" cy="-20" r="2" fill="#66cc66" opacity="0.6"/>
  </g>

  <!-- Player 4: Gold soldier (right) -->
  <g transform="translate(580, 720) scale(1.3)">
    <use href="#soldierShape" fill="#ccaa44" opacity="0.9" transform="scale(-1,1)"/>
    <circle cx="-14" cy="-20" r="2" fill="#eedd66" opacity="0.6"/>
  </g>

  <!-- Ground line -->
  <line x1="100" y1="785" x2="700" y2="785" stroke="#1a3a3a" stroke-width="0.5" opacity="0.4"/>

  <!-- ===== LOGO: W.A.R H.A.M.S ===== -->
  <!-- Text shadow / glow backing -->
  <text x="400" y="75" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="72" font-weight="bold" letter-spacing="8" fill="#2a8a8a" opacity="0.3" filter="url(#textGlow)">W.A.R H.A.M.S</text>

  <!-- Main metallic title -->
  <text x="400" y="75" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="72" font-weight="bold" letter-spacing="8" fill="url(#metalGrad)" stroke="#8a7a50" stroke-width="0.5">W.A.R H.A.M.S</text>

  <!-- Decorative lines flanking title -->
  <line x1="80" y1="90" x2="280" y2="90" stroke="url(#metalGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="520" y1="90" x2="720" y2="90" stroke="url(#metalGrad)" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="93" x2="280" y2="93" stroke="#2a8a8a" stroke-width="0.5" opacity="0.3"/>
  <line x1="520" y1="93" x2="720" y2="93" stroke="#2a8a8a" stroke-width="0.5" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="400" y="118" text-anchor="middle" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="20" letter-spacing="12" fill="#6ab0b0" opacity="0.9">THE BATTLE FOR PLANET X</text>

  <!-- Small decorative diamond under subtitle -->
  <polygon points="400,130 404,136 400,142 396,136" fill="#3a8a8a" opacity="0.5"/>

  <!-- ===== BOTTOM INFO BAR ===== -->
  <rect x="100" y="758" width="600" height="28" fill="url(#infoBarGrad)" rx="2"/>
  <line x1="130" y1="758" x2="670" y2="758" stroke="#3a8a8a" stroke-width="0.5" opacity="0.4"/>
  <text x="400" y="777" text-anchor="middle" font-family="'Trebuchet MS', 'Arial', sans-serif" font-size="13" letter-spacing="6" fill="#8ab0b0" opacity="0.9">2-4 PLAYERS  |  AGES 14+  |  90-150 MIN</text>

  <!-- Corner accents (military sci-fi framing) -->
  <g stroke="#3a8a8a" stroke-width="1" opacity="0.25" fill="none">
    <!-- Top-left -->
    <polyline points="10,40 10,10 40,10"/>
    <!-- Top-right -->
    <polyline points="760,10 790,10 790,40"/>
    <!-- Bottom-left -->
    <polyline points="10,760 10,790 40,790"/>
    <!-- Bottom-right -->
    <polyline points="760,790 790,790 790,760"/>
  </g>
</svg>