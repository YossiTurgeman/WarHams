<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <radialGradient id="dmgGrad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#ee3333"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <circle cx="32" cy="32" r="25" fill="#00000033"/>

  <!-- Red circle body -->
  <circle cx="30" cy="30" r="25" fill="url(#dmgGrad)" stroke="#881111" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="30" cy="30" r="21" fill="none" stroke="#aa1818" stroke-width="1" opacity="0.6"/>

  <!-- Crack / X pattern -->
  <!-- Main X -->
  <line x1="18" y1="18" x2="42" y2="42" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="42" y1="18" x2="18" y2="42" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Crack splinters off the X for extra damage feel -->
  <line x1="18" y1="18" x2="12" y2="14" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="18" x2="47" y2="12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="18" y1="42" x2="13" y2="47" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="42" x2="48" y2="46" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Small crack branches -->
  <line x1="30" y1="30" x2="30" y2="20" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="30" x2="22" y2="30" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
