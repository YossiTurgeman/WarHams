<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <defs>
    <linearGradient id="containerBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#3a3a4a"/>
    </linearGradient>
    <linearGradient id="containerTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555568"/>
      <stop offset="100%" stop-color="#48485a"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="6" y="6" width="110" height="70" rx="2" fill="#00000044"/>

  <!-- Container body -->
  <rect x="3" y="3" width="114" height="74" rx="2" fill="url(#containerBody)" stroke="#2a2a38" stroke-width="1.5"/>

  <!-- Top face (3D effect) -->
  <rect x="3" y="3" width="114" height="12" rx="2" fill="url(#containerTop)"/>

  <!-- Side ridges (corrugated container look) -->
  <line x1="16" y1="15" x2="16" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="26" y1="15" x2="26" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="15" x2="36" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="46" y1="15" x2="46" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="56" y1="15" x2="56" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="66" y1="15" x2="66" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="76" y1="15" x2="76" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="86" y1="15" x2="86" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="96" y1="15" x2="96" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
  <line x1="106" y1="15" x2="106" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>

  <!-- Edge rails (top/bottom horizontal bars) -->
  <rect x="3" y="14" width="114" height="2.5" fill="#4e4e60"/>
  <rect x="3" y="70" width="114" height="2.5" fill="#4e4e60"/>

  <!-- Corner brackets -->
  <rect x="3" y="3" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
  <rect x="107" y="3" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
  <rect x="3" y="71" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
  <rect x="107" y="71" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>

  <!-- Number placeholder -->
  <text x="60" y="52" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">#</text>

  <!-- W.A.R H.A.M.S branding -->
  <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#aabbcc" letter-spacing="0.8">W.A.R  H.A.M.S</text>
</svg>
