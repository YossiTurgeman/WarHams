<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="cBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#3a3a4a"/>
    </linearGradient>
    <linearGradient id="cTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555568"/>
      <stop offset="100%" stop-color="#48485a"/>
    </linearGradient>

    <!-- Reusable container template -->
    <symbol id="container" viewBox="0 0 120 80">
      <!-- Shadow -->
      <rect x="6" y="6" width="110" height="70" rx="2" fill="#00000044"/>
      <!-- Body -->
      <rect x="3" y="3" width="114" height="74" rx="2" fill="url(#cBody)" stroke="#2a2a38" stroke-width="1.5"/>
      <!-- Top face -->
      <rect x="3" y="3" width="114" height="12" rx="2" fill="url(#cTop)"/>
      <!-- Ridges -->
      <line x1="16" y1="15" x2="16" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="26" y1="15" x2="26" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="36" y1="15" x2="36" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="46" y1="15" x2="46" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="56" y1="15" x2="56" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="66" y1="15" x2="66" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="76" y1="15" x2="76" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="86" y1="15" x2="86" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="96" y1="15" x2="96" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <line x1="106" y1="15" x2="106" y2="72" stroke="#7788aa" stroke-width="1.2" opacity="0.5"/>
      <!-- Rails -->
      <rect x="3" y="14" width="114" height="2.5" fill="#4e4e60"/>
      <rect x="3" y="70" width="114" height="2.5" fill="#4e4e60"/>
      <!-- Corner brackets -->
      <rect x="3" y="3" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
      <rect x="107" y="3" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
      <rect x="3" y="71" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
      <rect x="107" y="71" width="10" height="6" rx="1" fill="#5a6a7a" opacity="0.7"/>
      <!-- Branding -->
      <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#aabbcc" letter-spacing="0.8">W.A.R  H.A.M.S</text>
    </symbol>
  </defs>

  <!-- Container 1 -->
  <use href="#container" x="5" y="10" width="120" height="80"/>
  <text x="65" y="62" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">1</text>

  <!-- Container 2 -->
  <use href="#container" x="135" y="10" width="120" height="80"/>
  <text x="195" y="62" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">2</text>

  <!-- Container 3 -->
  <use href="#container" x="265" y="10" width="120" height="80"/>
  <text x="325" y="62" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">3</text>

  <!-- Container 4 -->
  <use href="#container" x="395" y="10" width="120" height="80"/>
  <text x="455" y="62" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">4</text>

  <!-- Container 5 -->
  <use href="#container" x="525" y="10" width="120" height="80"/>
  <text x="585" y="62" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">5</text>

  <!-- Container 6 -->
  <use href="#container" x="655" y="10" width="120" height="80"/>
  <text x="715" y="62" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" opacity="0.9">6</text>
</svg>
