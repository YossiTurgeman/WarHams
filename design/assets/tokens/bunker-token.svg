<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="bunkerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5a3a"/>
      <stop offset="100%" stop-color="#3a4a2a"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <polygon points="42,5 73,23 73,59 42,77 11,59 11,23" fill="#00000033"/>

  <!-- Hexagonal body -->
  <polygon points="40,3 71,21 71,57 40,75 9,57 9,21" fill="url(#bunkerGrad)" stroke="#2a3a1a" stroke-width="1.5"/>

  <!-- Inner hex border -->
  <polygon points="40,9 65,24 65,54 40,69 15,54 15,24" fill="none" stroke="#5a6a4a" stroke-width="0.8" opacity="0.6"/>

  <!-- Bunker icon: fortification viewed from above -->
  <!-- Main bunker body (thick-walled rectangle) -->
  <rect x="24" y="28" width="32" height="22" rx="2" fill="#2a3a1a" stroke="#6a7a5a" stroke-width="1.2"/>

  <!-- Inner space (the bunker interior) -->
  <rect x="29" y="32" width="22" height="14" rx="1" fill="#3a4a2a" stroke="#5a6a4a" stroke-width="0.6"/>

  <!-- Gun slit / firing port (top) -->
  <rect x="36" y="27" width="8" height="4" rx="0.5" fill="#222" stroke="#6a7a5a" stroke-width="0.5"/>

  <!-- Side reinforcement blocks -->
  <rect x="20" y="33" width="5" height="12" rx="1" fill="#2a3a1a" stroke="#6a7a5a" stroke-width="0.8"/>
  <rect x="55" y="33" width="5" height="12" rx="1" fill="#2a3a1a" stroke="#6a7a5a" stroke-width="0.8"/>

  <!-- +1 DEF label -->
  <text x="40" y="43" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="8" font-weight="bold" fill="#ccddaa">+1</text>

  <!-- BUNKER label -->
  <text x="40" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#8a9a6a" font-weight="bold" letter-spacing="1">BUNKER</text>
</svg>
