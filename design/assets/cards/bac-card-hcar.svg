<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 352" width="252" height="352">
  <defs>
    <!-- Tech grid pattern -->
    <pattern id="techGrid" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="18" y2="0" stroke="#222244" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="0" y2="18" stroke="#222244" stroke-width="0.5"/>
    </pattern>
    <!-- Hexagon badge for DP -->
    <polygon id="hexBadge" points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="#2a2a4e" stroke="#8899aa" stroke-width="1.5"/>
    <!-- Crosshair icon for weapon art placeholder -->
    <g id="crosshair">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#445566" stroke-width="1"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#445566" stroke-width="0.7"/>
      <line x1="-24" y1="0" x2="24" y2="0" stroke="#445566" stroke-width="0.7"/>
      <line x1="0" y1="-24" x2="0" y2="24" stroke="#445566" stroke-width="0.7"/>
    </g>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="248" height="348" rx="8" ry="8" fill="#1a1a2e"/>
  <!-- Tech grid overlay -->
  <rect x="2" y="2" width="248" height="348" rx="8" ry="8" fill="url(#techGrid)"/>
  <!-- Border -->
  <rect x="2" y="2" width="248" height="348" rx="8" ry="8" fill="none" stroke="#8899aa" stroke-width="2"/>

  <!-- Color accent strip at top (red/orange for weapon type) -->
  <rect x="10" y="4" width="232" height="3" rx="1" fill="#cc4422"/>

  <!-- === TOP AREA === -->

  <!-- Abbreviation -->
  <text x="126" y="24" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cc8844" letter-spacing="2">H.C.A.R</text>

  <!-- Card name -->
  <text x="126" y="40" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#ffffff">Heavy Caliber Assault Rifle</text>

  <!-- Cost indicators (top-right) — 1 Industry (red), 1 Electricity (yellow) -->
  <g transform="translate(210, 22)">
    <!-- Industry (red) -->
    <circle cx="0" cy="0" r="5" fill="#cc3333" stroke="#ff5555" stroke-width="0.8"/>
    <text x="-10" y="3" text-anchor="end" font-family="sans-serif" font-size="7" fill="#cc5555">×1</text>
    <!-- Electricity (yellow) -->
    <circle cx="0" cy="13" r="5" fill="#ccaa00" stroke="#ffcc22" stroke-width="0.8"/>
    <text x="-10" y="16" text-anchor="end" font-family="sans-serif" font-size="7" fill="#ccaa00">×1</text>
  </g>

  <!-- === CENTER AREA === -->

  <!-- Art placeholder with crosshair -->
  <rect x="36" y="60" width="151" height="105" rx="4" fill="#10102a" stroke="#334455" stroke-width="1"/>
  <use href="#crosshair" x="111" y="108"/>
  <text x="111" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#445566">— WEAPON ART —</text>

  <!-- Card text area -->
  <rect x="20" y="176" width="212" height="110" rx="4" fill="#12122a" stroke="#2a2a4e" stroke-width="1"/>
  <text x="126" y="224" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dddddd">Add +1 to this soldier's</text>
  <text x="126" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dddddd">attack die.</text>

  <!-- === BOTTOM AREA === -->

  <!-- Slot indicator (bottom-left): Hands, die 6 -->
  <g transform="translate(18, 310)">
    <text x="0" y="0" font-family="sans-serif" font-size="11" fill="#cccccc">⚔</text>
    <text x="16" y="0" font-family="sans-serif" font-size="9" fill="#8899aa" font-weight="bold">HANDS</text>
    <!-- Die icon showing 6 -->
    <rect x="54" y="-11" width="14" height="14" rx="2" fill="#2a2a4e" stroke="#8899aa" stroke-width="1"/>
    <text x="61" y="0" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="8" fill="#ffffff">6</text>
  </g>

  <!-- DP value in hexagonal badge (bottom-right) -->
  <g transform="translate(218, 308)">
    <use href="#hexBadge"/>
    <text x="0" y="-2" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="10" fill="#ffffff">2</text>
    <text x="0" y="8" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#8899aa">DP</text>
  </g>

  <!-- Card type label -->
  <text x="126" y="348" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#445566">B.A.C — BASIC ARMAMENT CARD</text>
</svg>
