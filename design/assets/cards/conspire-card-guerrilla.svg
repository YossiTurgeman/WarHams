<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 352" width="252" height="352">
  <defs>
    <!-- Shadow/intrigue pattern -->
    <pattern id="intriguePattern" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="24" x2="24" y2="0" stroke="#1a1030" stroke-width="0.5"/>
      <line x1="0" y1="12" x2="12" y2="0" stroke="#1a1030" stroke-width="0.3"/>
      <line x1="12" y1="24" x2="24" y2="12" stroke="#1a1030" stroke-width="0.3"/>
    </pattern>
    <!-- Category pill badge -->
    <rect id="categoryPill" x="-32" y="-9" width="64" height="18" rx="9" fill="#1a1030" stroke="#6633aa" stroke-width="1"/>
    <!-- Explosion/burst icon for combat art -->
    <g id="combatBurst">
      <polygon points="0,-20 5,-8 18,-12 10,-2 22,6 9,6 8,20 0,10 -8,20 -9,6 -22,6 -10,-2 -18,-12 -5,-8" fill="none" stroke="#6633aa" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#6633aa" stroke-width="0.7"/>
    </g>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="248" height="348" rx="8" ry="8" fill="#12091f"/>
  <!-- Intrigue pattern overlay -->
  <rect x="2" y="2" width="248" height="348" rx="8" ry="8" fill="url(#intriguePattern)"/>
  <!-- Border -->
  <rect x="2" y="2" width="248" height="348" rx="8" ry="8" fill="none" stroke="#6633aa" stroke-width="2"/>

  <!-- Color accent strip at top -->
  <rect x="10" y="4" width="232" height="3" rx="1" fill="#6633aa"/>

  <!-- "CLASSIFIED" watermark diagonal -->
  <text x="126" y="200" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="32" fill="#1a1030" letter-spacing="4" transform="rotate(-30, 126, 200)" opacity="0.6">CLASSIFIED</text>

  <!-- === TOP AREA === -->

  <!-- Card name -->
  <text x="116" y="28" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="13" fill="#ffffff">Guerrilla Warfare</text>

  <!-- Cost area (top-right): 1 Local Favor (green) -->
  <g transform="translate(224, 20)">
    <circle cx="0" cy="0" r="12" fill="#1a1030" stroke="#339933" stroke-width="1.2"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="11" fill="#44cc44">1</text>
  </g>
  <!-- Resource label -->
  <text x="224" y="40" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#339933">LOCAL</text>
  <text x="224" y="46" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#339933">FAVOR</text>

  <!-- === CENTER AREA === -->

  <!-- Art placeholder with combat burst -->
  <rect x="30" y="54" width="160" height="110" rx="4" fill="#10081e" stroke="#3a2060" stroke-width="1"/>
  <use href="#combatBurst" x="110" y="104"/>
  <text x="110" y="148" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6633aa">— GUERRILLA ART —</text>

  <!-- Effect text area -->
  <rect x="16" y="176" width="220" height="120" rx="4" fill="#0e0718" stroke="#2a1848" stroke-width="1"/>
  <text x="126" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dddddd">Add 1d6 die to an attack</text>
  <text x="126" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#dddddd">combat roll of your choosing.</text>

  <!-- === BOTTOM AREA === -->

  <!-- Conspire eye icon (bottom-left) -->
  <g transform="translate(30, 320)">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="none" stroke="#6633aa" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="3" fill="#6633aa"/>
    <circle cx="0" cy="0" r="1.2" fill="#ffffff"/>
  </g>

  <!-- Category indicator (bottom-center): COMBAT -->
  <g transform="translate(126, 320)">
    <use href="#categoryPill"/>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="8" fill="#bb88ee" letter-spacing="1.5">COMBAT</text>
  </g>

  <!-- Card type label -->
  <text x="126" y="348" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#4a2a6e">CONSPIRE — POLITICAL MANEUVER CARD</text>
</svg>