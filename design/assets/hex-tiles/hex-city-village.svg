<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <clipPath id="hex-clip">
      <polygon points="100,8 186,54 186,146 100,192 14,146 14,54"/>
    </clipPath>
  </defs>
  <!-- Hex background -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="#0a1a0e"/>
  <!-- Hex border -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="none" stroke="#22aa44" stroke-width="6"/>
  <!-- Title -->
  <text x="100" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#44cc66" letter-spacing="1">CITY / VILLAGE</text>
  <!-- Building cluster -->
  <g fill="#1a3a22" stroke="#22772e" stroke-width="0.5">
    <!-- Tall building (center-left) -->
    <rect x="65" y="60" width="20" height="78" rx="1" fill="#153020"/>
    <!-- Tall building windows -->
    <rect x="69" y="65" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <rect x="76" y="65" width="5" height="5" fill="#22aa44" opacity="0.25"/>
    <rect x="69" y="75" width="5" height="5" fill="#22aa44" opacity="0.35"/>
    <rect x="76" y="75" width="5" height="5" fill="#22aa44" opacity="0.2"/>
    <rect x="69" y="85" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <rect x="76" y="85" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <rect x="69" y="95" width="5" height="5" fill="#22aa44" opacity="0.2"/>
    <rect x="76" y="95" width="5" height="5" fill="#22aa44" opacity="0.35"/>
    <rect x="69" y="105" width="5" height="5" fill="#22aa44" opacity="0.25"/>
    <rect x="76" y="105" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <!-- Medium building (center-right) -->
    <rect x="90" y="80" width="22" height="58" rx="1" fill="#183822"/>
    <!-- Medium building windows -->
    <rect x="94" y="85" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <rect x="103" y="85" width="5" height="5" fill="#22aa44" opacity="0.2"/>
    <rect x="94" y="95" width="5" height="5" fill="#22aa44" opacity="0.25"/>
    <rect x="103" y="95" width="5" height="5" fill="#22aa44" opacity="0.35"/>
    <rect x="94" y="105" width="5" height="5" fill="#22aa44" opacity="0.2"/>
    <rect x="103" y="105" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <!-- Small building (right) -->
    <rect x="116" y="105" width="22" height="33" rx="1" fill="#153020"/>
    <!-- Small roof -->
    <polygon points="116,105 127,92 138,105" fill="#1a3826"/>
    <!-- Small building windows -->
    <rect x="120" y="112" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <rect x="129" y="112" width="5" height="5" fill="#22aa44" opacity="0.25"/>
    <!-- Short building (far left) -->
    <rect x="42" y="110" width="18" height="28" rx="1" fill="#183822"/>
    <!-- Short building window -->
    <rect x="46" y="115" width="5" height="5" fill="#22aa44" opacity="0.25"/>
    <rect x="53" y="115" width="5" height="5" fill="#22aa44" opacity="0.3"/>
    <!-- Ground -->
    <rect x="35" y="136" width="110" height="5" rx="1" fill="#0d150f"/>
  </g>
  <!-- Number token circle -->
  <circle cx="100" cy="170" r="14" fill="#0a1a0e" stroke="#44cc66" stroke-width="1.5"/>
</svg>