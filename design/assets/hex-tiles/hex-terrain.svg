<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <!-- Hex background -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="#1a2218"/>
  <!-- Hex border (thin, no color accent) -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="none" stroke="#3a4a38" stroke-width="2"/>
  <!-- Title -->
  <text x="100" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#5a6a58" letter-spacing="1">TERRAIN</text>
  <!-- Rolling hills landscape -->
  <g fill="#253020" stroke="none">
    <!-- Far hills (background) -->
    <path d="M25,105 Q50,75 80,95 Q100,80 120,90 Q145,70 175,100 L175,145 L25,145 Z" fill="#1e2a1a" opacity="0.7"/>
    <!-- Mid hills -->
    <path d="M20,120 Q45,95 70,110 Q90,95 110,108 Q135,90 165,115 L170,145 L20,145 Z" fill="#253018"/>
    <!-- Foreground hills -->
    <path d="M18,135 Q40,115 65,128 Q85,118 105,125 Q125,115 150,130 Q165,122 180,138 L180,150 L18,150 Z" fill="#2d3820"/>
    <!-- Ground plane -->
    <rect x="18" y="140" width="165" height="8" fill="#222e1a"/>
    <!-- Tree silhouettes on hills -->
    <!-- Tree 1 -->
    <polygon points="55,100 50,115 60,115" fill="#1a2816"/>
    <rect x="54" y="115" width="2" height="5" fill="#1a2816"/>
    <!-- Tree 2 -->
    <polygon points="82,88 76,105 88,105" fill="#1a2816"/>
    <rect x="81" y="105" width="2" height="5" fill="#1a2816"/>
    <!-- Tree 3 -->
    <polygon points="125,85 119,102 131,102" fill="#1a2816"/>
    <rect x="124" y="102" width="2" height="5" fill="#1a2816"/>
    <!-- Tree 4 (small) -->
    <polygon points="145,95 141,106 149,106" fill="#1a2816"/>
    <rect x="144" y="106" width="2" height="4" fill="#1a2816"/>
    <!-- Tree 5 -->
    <polygon points="40,108 35,120 45,120" fill="#1a2816"/>
    <rect x="39" y="120" width="2" height="4" fill="#1a2816"/>
    <!-- Rock formations -->
    <polygon points="155,125 150,135 160,135" fill="#2a3020"/>
    <polygon points="35,130 30,138 40,138" fill="#2a3020"/>
    <!-- Subtle terrain texture dots -->
    <circle cx="70" cy="132" r="1" fill="#344028" opacity="0.5"/>
    <circle cx="100" cy="138" r="1" fill="#344028" opacity="0.5"/>
    <circle cx="130" cy="134" r="1" fill="#344028" opacity="0.5"/>
    <circle cx="90" cy="128" r="1.5" fill="#344028" opacity="0.4"/>
    <circle cx="115" cy="130" r="1" fill="#344028" opacity="0.5"/>
  </g>
  <!-- No number token circle for terrain tiles -->
</svg>