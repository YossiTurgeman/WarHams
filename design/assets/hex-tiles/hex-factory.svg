<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <clipPath id="hex-clip">
      <polygon points="100,8 186,54 186,146 100,192 14,146 14,54"/>
    </clipPath>
  </defs>
  <!-- Hex background -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="#1a0808"/>
  <!-- Hex border -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="none" stroke="#cc2222" stroke-width="6"/>
  <!-- Title -->
  <text x="100" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#cc4444" letter-spacing="1">FACTORY</text>
  <!-- Factory building -->
  <g fill="#661818" stroke="#882020" stroke-width="0.5">
    <!-- Main building body -->
    <rect x="45" y="95" width="75" height="45" rx="2" fill="#4a1010"/>
    <!-- Sawtooth roof -->
    <polygon points="45,95 45,80 75,95" fill="#5a1515"/>
    <polygon points="75,95 75,80 105,95" fill="#5a1515"/>
    <polygon points="105,95 105,80 120,95" fill="#5a1515"/>
    <!-- Smokestack 1 (tall) -->
    <rect x="55" y="48" width="10" height="47" rx="1" fill="#551212"/>
    <!-- Smokestack 2 (shorter) -->
    <rect x="125" y="70" width="12" height="70" rx="1" fill="#551212"/>
    <!-- Smoke puffs from stack 1 -->
    <circle cx="60" cy="44" r="5" fill="#882020" opacity="0.4"/>
    <circle cx="57" cy="36" r="4" fill="#882020" opacity="0.3"/>
    <circle cx="62" cy="30" r="3" fill="#882020" opacity="0.2"/>
    <!-- Smoke puffs from stack 2 -->
    <circle cx="131" cy="66" r="4" fill="#882020" opacity="0.4"/>
    <circle cx="128" cy="59" r="3" fill="#882020" opacity="0.3"/>
    <!-- Loading dock door -->
    <rect x="65" y="115" width="18" height="25" rx="1" fill="#330808"/>
    <rect x="90" y="115" width="18" height="25" rx="1" fill="#330808"/>
    <!-- Windows -->
    <rect x="50" y="100" width="6" height="6" rx="1" fill="#cc2222" opacity="0.3"/>
    <rect x="110" y="100" width="6" height="6" rx="1" fill="#cc2222" opacity="0.3"/>
    <!-- Ground -->
    <rect x="35" y="138" width="100" height="4" rx="1" fill="#2a0a0a"/>
  </g>
  <!-- Number token circle -->
  <circle cx="100" cy="170" r="14" fill="#1a0808" stroke="#cc4444" stroke-width="1.5"/>
</svg>