<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <clipPath id="hex-clip">
      <polygon points="100,8 186,54 186,146 100,192 14,146 14,54"/>
    </clipPath>
  </defs>
  <!-- Hex background -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="#180a28"/>
  <!-- Hex border -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="none" stroke="#8833cc" stroke-width="6"/>
  <!-- Title -->
  <text x="100" y="36" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#aa66dd" letter-spacing="1">SPACEPORT</text>
  <!-- Landing pad -->
  <g fill="#2a1540" stroke="#5522aa" stroke-width="0.5">
    <!-- Landing pad (circle on ground) -->
    <ellipse cx="100" cy="135" rx="45" ry="10" fill="#221238" stroke="#5522aa" stroke-width="1.5"/>
    <!-- Pad inner ring -->
    <ellipse cx="100" cy="135" rx="30" ry="7" fill="none" stroke="#5522aa" stroke-width="1" opacity="0.5"/>
    <!-- Pad center cross -->
    <line x1="100" y1="127" x2="100" y2="143" stroke="#8833cc" stroke-width="1.5" opacity="0.4"/>
    <line x1="85" y1="135" x2="115" y2="135" stroke="#8833cc" stroke-width="1.5" opacity="0.4"/>
    <!-- Pad H marking -->
    <text x="100" y="138" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold" fill="#8833cc" opacity="0.3">H</text>
    <!-- Rocket ship silhouette -->
    <!-- Nose cone -->
    <path d="M100,45 L93,70 L107,70 Z" fill="#3a1a5a"/>
    <!-- Body -->
    <rect x="93" y="70" width="14" height="40" rx="1" fill="#301550"/>
    <!-- Body detail stripe -->
    <rect x="93" y="82" width="14" height="3" fill="#8833cc" opacity="0.3"/>
    <!-- Fins -->
    <polygon points="93,100 80,115 80,120 93,110" fill="#3a1a5a"/>
    <polygon points="107,100 120,115 120,120 107,110" fill="#3a1a5a"/>
    <!-- Engine bell -->
    <path d="M93,110 L88,125 L112,125 L107,110 Z" fill="#2a1040"/>
    <!-- Exhaust flame -->
    <polygon points="93,125 100,142 107,125" fill="#aa66dd" opacity="0.4"/>
    <polygon points="96,125 100,135 104,125" fill="#cc88ff" opacity="0.3"/>
    <!-- Landing lights -->
    <circle cx="60" cy="130" r="2" fill="#aa66dd" opacity="0.5"/>
    <circle cx="140" cy="130" r="2" fill="#aa66dd" opacity="0.5"/>
    <circle cx="70" cy="140" r="2" fill="#aa66dd" opacity="0.4"/>
    <circle cx="130" cy="140" r="2" fill="#aa66dd" opacity="0.4"/>
  </g>
  <!-- Number token circle -->
  <circle cx="100" cy="170" r="14" fill="#180a28" stroke="#aa66dd" stroke-width="1.5"/>
</svg>