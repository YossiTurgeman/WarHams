<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <defs>
    <clipPath id="hex-clip">
      <polygon points="100,8 186,54 186,146 100,192 14,146 14,54"/>
    </clipPath>
  </defs>
  <!-- Hex background -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="#0d0d0d"/>
  <!-- Hex border -->
  <polygon points="100,8 186,54 186,146 100,192 14,146 14,54" fill="none" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Title -->
  <text x="100" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#888888" letter-spacing="1">OIL RIG</text>
  <!-- Oil Derrick silhouette -->
  <g fill="#555555" stroke="#666666" stroke-width="0.5">
    <!-- Derrick tower (triangular frame) -->
    <polygon points="100,55 82,135 118,135"/>
    <!-- Cross braces -->
    <line x1="88" y1="95" x2="112" y2="95" stroke="#333333" stroke-width="2"/>
    <line x1="85" y1="115" x2="115" y2="115" stroke="#333333" stroke-width="2"/>
    <!-- Base platform -->
    <rect x="72" y="132" width="56" height="8" rx="1" fill="#444444"/>
    <!-- Pump arm extending right -->
    <rect x="118" y="90" width="30" height="4" rx="1" fill="#555555"/>
    <!-- Pump head (horse head) -->
    <path d="M148,88 L152,82 L148,76 L144,82 L148,88 Z" fill="#666666"/>
    <!-- Pump walking beam pivot -->
    <circle cx="118" cy="92" r="3" fill="#666666"/>
    <!-- Pump rod hanging down -->
    <rect x="149" y="88" width="3" height="42" fill="#555555"/>
    <!-- Pump base -->
    <rect x="145" y="128" width="10" height="12" rx="1" fill="#444444"/>
    <!-- Oil drops -->
    <ellipse cx="100" cy="148" rx="20" ry="5" fill="#222222" opacity="0.6"/>
  </g>
  <!-- Number token circle -->
  <circle cx="100" cy="170" r="14" fill="#1a1a1a" stroke="#555555" stroke-width="1.5"/>
</svg>