<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="50%" stop-color="#252a3a"/>
      <stop offset="100%" stop-color="#1a1e2e"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1118"/>
      <stop offset="15%" stop-color="#e8b830"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="85%" stop-color="#e8b830"/>
      <stop offset="100%" stop-color="#0f1118"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="#0f1118" rx="12"/>
  <rect x="4" y="4" width="792" height="1092" fill="none" stroke="#2a3050" stroke-width="1.5" rx="10"/>

  <!-- ════════ TITLE ════════ -->
  <rect x="0" y="0" width="800" height="62" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="50" width="800" height="12" fill="url(#headerGrad)"/>
  <rect x="40" y="58" width="720" height="2" fill="url(#accentLine)"/>
  <text x="400" y="42" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="26" font-weight="900" letter-spacing="4" fill="#f0d060" filter="url(#glow)">W.A.R  H.A.M.S — QUICK REFERENCE</text>

  <!-- ════════ SECTION 1: TURN PHASES ════════ -->
  <rect x="20" y="72" width="760" height="20" fill="#1e2436" rx="4"/>
  <text x="30" y="87" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#e8b830" letter-spacing="3">TURN PHASES</text>

  <!-- Phase items -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#d8dce8">
    <!-- Phase 1 -->
    <circle cx="38" cy="108" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="112" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">1</text>
    <text x="54" y="112" font-weight="700" fill="#f0d060">Resource Production</text>
    <text x="200" y="112" fill="#a0a8c0">— Roll 3d6, place tokens.</text>
    <text x="400" y="112" fill="#8090b0">Doubles = BAC to spaceport.</text>
    <text x="610" y="112" fill="#8090b0">Triples = choose spaceport.</text>

    <!-- Phase 2 -->
    <circle cx="38" cy="132" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="136" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">2</text>
    <text x="54" y="136" font-weight="700" fill="#f0d060">Movement</text>
    <text x="128" y="136" fill="#a0a8c0">— 1 hex/soldier (2 w/ Jump Jets).</text>
    <text x="370" y="136" fill="#7888a8">OR</text>
    <text x="392" y="136" font-weight="700" fill="#c0a0e0">Conspire:</text>
    <text x="460" y="136" fill="#a0a8c0">draw 3, keep 1.</text>

    <!-- Phase 3 -->
    <circle cx="38" cy="156" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="160" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">3</text>
    <text x="54" y="160" font-weight="700" fill="#f0d060">Combat</text>
    <text x="116" y="160" fill="#a0a8c0">— Attack enemies within 1–2 hexes.</text>

    <!-- Phase 4 -->
    <circle cx="38" cy="180" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="184" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">4</text>
    <text x="54" y="184" font-weight="700" fill="#f0d060">Resource Gathering</text>
    <text x="196" y="184" fill="#a0a8c0">— Collect from same or adjacent hex.</text>

    <!-- Phase 5 -->
    <circle cx="38" cy="204" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="208" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">5</text>
    <text x="54" y="208" font-weight="700" fill="#f0d060">Purchase &amp; Equip</text>
    <text x="178" y="208" fill="#a0a8c0">— Buy BACs, recruit soldiers.</text>

    <!-- Phase 6 -->
    <circle cx="38" cy="228" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="232" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">6</text>
    <text x="54" y="232" font-weight="700" fill="#f0d060">Trade</text>
    <text x="98" y="232" fill="#a0a8c0">— Trade resources freely with other players.</text>

    <!-- Phase 7 -->
    <circle cx="38" cy="252" r="9" fill="#e8b830" opacity="0.9"/>
    <text x="38" y="256" text-anchor="middle" font-size="11" font-weight="800" fill="#0f1118">7</text>
    <text x="54" y="256" font-weight="700" fill="#f0d060">Move Separatists</text>
    <text x="182" y="256" fill="#a0a8c0">— Consume → Seek → Wander.</text>
  </g>

  <!-- ════════ DIVIDER ════════ -->
  <rect x="40" y="274" width="720" height="1" fill="#2a3050"/>

  <!-- ════════ SECTION 2: EQUIPMENT SLOTS (Left) ════════ -->
  <rect x="20" y="284" width="370" height="20" fill="#1e2436" rx="4"/>
  <text x="30" y="299" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#50b0e0" letter-spacing="3">EQUIPMENT SLOTS</text>

  <g font-family="'Segoe UI',Arial,sans-serif" font-size="12">
    <!-- Table header -->
    <rect x="28" y="310" width="354" height="18" fill="#182030" rx="3"/>
    <text x="80" y="323" text-anchor="middle" font-weight="700" fill="#6090c0">DIE ROLL</text>
    <text x="260" y="323" text-anchor="middle" font-weight="700" fill="#6090c0">SLOT</text>

    <!-- Rows -->
    <rect x="28" y="330" width="354" height="17" fill="#141a28" rx="2"/>
    <text x="80" y="343" text-anchor="middle" fill="#e8b830" font-weight="700">1</text>
    <text x="260" y="343" text-anchor="middle" fill="#d0d4e0">🪖 Head</text>

    <rect x="28" y="348" width="354" height="17" fill="#111822" rx="2"/>
    <text x="80" y="361" text-anchor="middle" fill="#e8b830" font-weight="700">2</text>
    <text x="260" y="361" text-anchor="middle" fill="#d0d4e0">🎒 Backpack</text>

    <rect x="28" y="366" width="354" height="17" fill="#141a28" rx="2"/>
    <text x="80" y="379" text-anchor="middle" fill="#e8b830" font-weight="700">3</text>
    <text x="260" y="379" text-anchor="middle" fill="#d0d4e0">🦿 Legs</text>

    <rect x="28" y="384" width="354" height="17" fill="#111822" rx="2"/>
    <text x="80" y="397" text-anchor="middle" fill="#e8b830" font-weight="700">4–5</text>
    <text x="260" y="397" text-anchor="middle" fill="#d0d4e0">🛡️ Chest</text>

    <rect x="28" y="402" width="354" height="17" fill="#141a28" rx="2"/>
    <text x="80" y="415" text-anchor="middle" fill="#e8b830" font-weight="700">6</text>
    <text x="260" y="415" text-anchor="middle" fill="#d0d4e0">🖐️ Hands</text>
  </g>

  <!-- ════════ SECTION 3: RESOURCE COLORS (Right) ════════ -->
  <rect x="410" y="284" width="370" height="20" fill="#1e2436" rx="4"/>
  <text x="420" y="299" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#50b0e0" letter-spacing="3">RESOURCE COLORS</text>

  <g font-family="'Segoe UI',Arial,sans-serif" font-size="13">
    <!-- Oil -->
    <circle cx="440" cy="322" r="10" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
    <text x="458" y="327" font-weight="600" fill="#b0b4c0">Oil</text>
    <text x="488" y="327" fill="#707888" font-size="11">(Black)</text>

    <!-- Electricity -->
    <circle cx="440" cy="348" r="10" fill="#f0d020" stroke="#c8a800" stroke-width="1"/>
    <text x="458" y="353" font-weight="600" fill="#f0d060">Electricity</text>
    <text x="536" y="353" fill="#707888" font-size="11">(Yellow)</text>

    <!-- Intelligence -->
    <circle cx="440" cy="374" r="10" fill="#3080e0" stroke="#2060b0" stroke-width="1"/>
    <text x="458" y="379" font-weight="600" fill="#70b0f0">Intelligence</text>
    <text x="544" y="379" fill="#707888" font-size="11">(Blue)</text>

    <!-- Industry -->
    <circle cx="440" cy="400" r="10" fill="#d03030" stroke="#a02020" stroke-width="1"/>
    <text x="458" y="405" font-weight="600" fill="#f06060">Industry</text>
    <text x="522" y="405" fill="#707888" font-size="11">(Red)</text>

    <!-- Local Favor -->
    <circle cx="440" cy="426" r="10" fill="#30a040" stroke="#208030" stroke-width="1"/>
    <text x="458" y="431" font-weight="600" fill="#60d070">Local Favor</text>
    <text x="544" y="431" fill="#707888" font-size="11">(Green)</text>
  </g>

  <!-- ════════ DIVIDER ════════ -->
  <rect x="40" y="448" width="720" height="1" fill="#2a3050"/>

  <!-- ════════ SECTION 4: COMBAT STEPS ════════ -->
  <rect x="20" y="458" width="760" height="20" fill="#1e2436" rx="4"/>
  <text x="30" y="473" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#f06060" letter-spacing="3">COMBAT STEPS</text>

  <g font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#c0c8d8">
    <!-- Row 1: Steps 1-3 -->
    <g>
      <rect x="28" y="486" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="39" y="500" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">1</text>
      <text x="56" y="500" fill="#e8c0c0">Roll 1d6 per soldier</text>

      <text x="190" y="500" fill="#404858" font-size="16">→</text>

      <rect x="206" y="486" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="217" y="500" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">2</text>
      <text x="234" y="500" fill="#e8c0c0">Larger side picks best dice</text>

      <text x="402" y="500" fill="#404858" font-size="16">→</text>

      <rect x="418" y="486" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="429" y="500" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">3</text>
      <text x="446" y="500" fill="#e8c0c0">Attacker assigns dice to targets</text>
    </g>

    <!-- Row 2: Steps 4-6 -->
    <g>
      <rect x="28" y="512" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="39" y="526" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">4</text>
      <text x="56" y="526" fill="#e8c0c0">Defender aligns dice</text>

      <text x="190" y="526" fill="#404858" font-size="16">→</text>

      <rect x="206" y="512" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="217" y="526" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">5</text>
      <text x="234" y="526" fill="#e8c0c0">Add equipment bonuses</text>

      <text x="402" y="526" fill="#404858" font-size="16">→</text>

      <rect x="418" y="512" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="429" y="526" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">6</text>
      <text x="446" y="526" fill="#e8c0c0">Play Conspire cards (defender first)</text>
    </g>

    <!-- Row 3: Steps 7-9 -->
    <g>
      <rect x="28" y="538" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="39" y="552" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">7</text>
      <text x="56" y="552" fill="#e8c0c0">Hit = attack &gt; defense</text>

      <text x="190" y="552" fill="#404858" font-size="16">→</text>

      <rect x="206" y="538" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="217" y="552" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">8</text>
      <text x="234" y="552" fill="#e8c0c0">4 damage = death ☠️</text>

      <text x="402" y="552" fill="#404858" font-size="16">→</text>

      <rect x="418" y="538" width="22" height="18" fill="#d03030" rx="4"/>
      <text x="429" y="552" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">9</text>
      <text x="446" y="552" fill="#e8c0c0">Defense +3 over attack = counterattack!</text>
    </g>
  </g>

  <!-- ════════ DIVIDER ════════ -->
  <rect x="40" y="572" width="720" height="1" fill="#2a3050"/>

  <!-- ════════ SECTION 5: KEY COSTS ════════ -->
  <rect x="20" y="582" width="760" height="20" fill="#1e2436" rx="4"/>
  <text x="30" y="597" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#60d070" letter-spacing="3">KEY COSTS</text>

  <g font-family="'Segoe UI',Arial,sans-serif" font-size="12">
    <!-- Row backgrounds -->
    <rect x="28" y="608" width="744" height="20" fill="#141a28" rx="3"/>
    <rect x="28" y="630" width="744" height="20" fill="#111822" rx="3"/>
    <rect x="28" y="652" width="744" height="20" fill="#141a28" rx="3"/>
    <rect x="28" y="674" width="744" height="20" fill="#111822" rx="3"/>

    <!-- Recruit Soldier -->
    <text x="38" y="623" font-weight="700" fill="#e8e0d0">Recruit Soldier</text>
    <text x="170" y="623" fill="#a0a8c0">—</text>
    <!-- Resource icons inline -->
    <circle cx="192" cy="619" r="5" fill="#30a040"/><circle cx="212" cy="619" r="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/><circle cx="232" cy="619" r="5" fill="#d03030"/><circle cx="252" cy="619" r="5" fill="#f0d020"/>
    <text x="268" y="623" fill="#8898b0" font-size="11">1 each: Local Favor, Oil, Industry, Electricity</text>
    <text x="605" y="623" fill="#606878" font-size="11" font-style="italic">(must be at City)</text>

    <!-- New Squad -->
    <text x="38" y="645" font-weight="700" fill="#e8e0d0">New Squad (min 5)</text>
    <text x="170" y="645" fill="#a0a8c0">—</text>
    <text x="185" y="645" fill="#8898b0" font-size="11">5× soldier cost</text>
    <text x="300" y="645" fill="#606878" font-size="11">(5 Local Favor + 5 Oil + 5 Industry + 5 Electricity)</text>

    <!-- Draw from Spaceport -->
    <text x="38" y="667" font-weight="700" fill="#e8e0d0">Draw from Spaceport Deck</text>
    <text x="218" y="667" fill="#a0a8c0">—</text>
    <text x="233" y="667" fill="#8898b0" font-size="11">3 same-color resources</text>

    <!-- Conspire -->
    <text x="38" y="689" font-weight="700" fill="#e8e0d0">Conspire</text>
    <text x="108" y="689" fill="#a0a8c0">—</text>
    <text x="123" y="689" fill="#8898b0" font-size="11">Forfeit 1 Squad's Movement or Attack phase</text>
  </g>

  <!-- ════════ DIVIDER ════════ -->
  <rect x="40" y="706" width="720" height="1" fill="#2a3050"/>

  <!-- ════════ SECTION 6: VICTORY CONDITIONS ════════ -->
  <rect x="20" y="716" width="760" height="20" fill="#1e2436" rx="4"/>
  <text x="30" y="731" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#c090f0" letter-spacing="3">VICTORY CONDITIONS</text>
  <text x="245" y="731" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#707090" font-style="italic">(achieve any one to win)</text>

  <g font-family="'Segoe UI',Arial,sans-serif">
    <!-- Spaceport Control -->
    <rect x="40" y="746" width="226" height="60" fill="#181e30" stroke="#3040608" stroke-width="1" rx="8"/>
    <text x="153" y="770" text-anchor="middle" font-size="22">🚀</text>
    <text x="153" y="790" text-anchor="middle" font-size="12" font-weight="700" fill="#c090f0">Control all 6 Spaceports</text>

    <!-- Army Strength -->
    <rect x="286" y="746" width="226" height="60" fill="#181e30" stroke="#304060" stroke-width="1" rx="8"/>
    <text x="399" y="770" text-anchor="middle" font-size="22">💪</text>
    <text x="399" y="790" text-anchor="middle" font-size="12" font-weight="700" fill="#c090f0">4 Squads of 7 (28 soldiers)</text>

    <!-- Dominance Points -->
    <rect x="532" y="746" width="226" height="60" fill="#181e30" stroke="#304060" stroke-width="1" rx="8"/>
    <text x="645" y="770" text-anchor="middle" font-size="22">👑</text>
    <text x="645" y="790" text-anchor="middle" font-size="12" font-weight="700" fill="#c090f0">50 Dominance Points</text>
  </g>

  <!-- ════════ FOOTER ════════ -->
  <rect x="40" y="830" width="720" height="1" fill="url(#accentLine)"/>
  <text x="400" y="852" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#404858" letter-spacing="2">W.A.R  H.A.M.S  •  WARGAME OF ARMED RESISTANCE: HOSTILE ACQUISITIONS IN MERCENARY SPACE</text>
</svg>